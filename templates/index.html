<!DOCTYPE html>
<html>
<head>
<title>Mail Analyzer 2.0</title>
<meta charset="utf-8">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>Mail Analyzer 2.0</h2>

    <label>From Date/Time</label>
    <input type="datetime-local" id="startDate">

    <label>To Date/Time</label>
    <input type="datetime-local" id="endDate">

    <label>Main Keywords</label>
    <div class="search-row">
      <input type="text" id="mainKeywords" placeholder="server; [[502, 504]]"
             title="Operators:  , = OR    ; = AND    [[ ]] = group    <{( regex )}>">
      <button class="icon-btn" type="button" onclick="applyFilters()" title="Search">🔍</button>
    </div>
    <div class="hint">, = or &nbsp; ; = and &nbsp; [[ ]] = group &nbsp; &lt;{(&nbsp;regex&nbsp;)}&gt;</div>
    <button type="button" id="excludeKeywordsToggle" class="exclude-toggle"
            onclick="toggleExclude('keywords')">+ Exclude keywords</button>
    <input type="text" id="excludeKeywords" class="exclude-field" hidden
           placeholder="spam, ads, newsletter" title="Hide mail matching these. Same operators.">

    <label>Optional Keywords</label>
    <input type="text" id="optionalKeywords" placeholder="urgent, critical"
           title="Highlight only. Same operators as Main Keywords.">

    <label>Sender</label>
    <input type="text" id="senderFilter" class="person-drop" placeholder="alice, bob"
           title="Same operators as Main Keywords. Drag a name/email here.">
    <button type="button" id="excludeSenderToggle" class="exclude-toggle"
            onclick="toggleExclude('sender')">+ Exclude sender</button>
    <input type="text" id="excludeSenderFilter" class="person-drop exclude-field" hidden
           placeholder="exclude sender…" title="Hide mail FROM these. Same operators.">

    <label>Recipient</label>
    <input type="text" id="recipientFilter" class="person-drop" placeholder="name or email"
           title="Same operators as Main Keywords. Drag a name/email here.">
    <button type="button" id="excludeRecipientToggle" class="exclude-toggle"
            onclick="toggleExclude('recipient')">+ Exclude recipient</button>
    <input type="text" id="excludeRecipientFilter" class="person-drop exclude-field" hidden
           placeholder="exclude recipient…" title="Hide mail TO these. Same operators.">

    <button type="button" id="resourcesToggle" class="toggle-btn"
            aria-pressed="false" onclick="toggleResources()">
      📎 Attachments &amp; Links: Off
    </button>
    <button type="button" id="blacklistToggle" class="exclude-toggle"
            onclick="toggleBlacklist()">+ Blacklist</button>
    <div id="blacklistFields" hidden>
      <label>Attachment blacklist</label>
      <input type="text" id="attachmentBlacklist" placeholder="e.g. .exe, <{(invoice\d+)}>"
             title="Don't show matching attachments (the mail still shows). Same operators.">
      <label>Links blacklist</label>
      <input type="text" id="linksBlacklist" placeholder="e.g. tracking, unsubscribe"
             title="Don't show matching links (the mail still shows). Same operators.">
    </div>

    <div class="status-group">
      <div class="status-box">
        <b>Last Refresh</b>
        <div id="lastRefresh">Never</div>
      </div>
      <div class="status-box">
        <b>Status</b>
        <div id="fetchStatus">Unknown</div>
      </div>
      <button class="icon-btn refresh-btn" type="button" onclick="refreshMail()" title="Refresh Mail">⟳</button>
    </div>
  </div>

  <div class="content">
    <div class="content-bar">
      <button id="regexToggle" class="tray-toggle" onclick="toggleRegex()"
              title="Build a regex from dragged names, emails, links, or attachment filenames">🧬 Regex Compiler</button>
      <button id="trayToggle" class="tray-toggle" onclick="toggleTray()"
              title="Open a workspace you can drag mail into">🗂 Workspace</button>
    </div>
    <div class="content-split">
      <div id="mailContainer" class="mail-list"></div>
      <div id="tray" class="tray" hidden>
        <div id="workspaceView">
          <div class="tray-header">
            <h2 class="tray-title">Workspace <span id="trayCount">(0)</span></h2>
            <div class="tray-actions">
              <span id="collectWrap" class="collect-wrap">
                <button id="trayCollectBtn" class="flip-btn" type="button"
                        title="Hover to pick a label, then click to collect matching mails">𖣐</button>
                <div id="collectWheel" class="collect-wheel" hidden></div>
              </span>
              <button id="trayMarkBtn" class="flip-btn" onclick="toggleTrayMark()"
                      title="Mark every item here" disabled>🎯</button>
              <button id="traySortBtn" class="flip-btn" onclick="toggleTraySort()"
                      title="Sorted newest first — click for oldest first" disabled>▼</button>
              <button id="trayDownloadBtn" class="flip-btn" onclick="downloadTrayAttachments()"
                      title="Download every attachment of the items here" disabled>⬇</button>
              <button id="trayLinksBtn" class="flip-btn" onclick="openTrayLinks()"
                      title="Open every link of the items here in new tabs" disabled>🔗</button>
              <button id="trayReportBtn" class="flip-btn" onclick="exportTrayReport()"
                      title="Export a CSV report of the items here" disabled>📄</button>
              <button class="flip-btn" onclick="clearTray()" title="Clear workspace">🧹</button>
            </div>
            <div id="trayStatus" class="tray-status"></div>
          </div>
          <div id="trayBody" class="tray-body">
            <p class="tray-empty">Drag mail items here to collect them.</p>
          </div>
        </div>
        <div id="regexView" hidden>
          <div class="tray-header">
            <h2 class="tray-title">Regex Compiler</h2>
            <div class="tray-actions">
              <button class="flip-btn" onclick="compileRegex()"
                      title="Generate a regex matching every segment">🔨 Compile</button>
              <button id="encaseBtn" class="flip-btn" onclick="toggleEncase()" disabled
                      title="Wrap the regex in <{( … )}> for a search field">📦 Encase</button>
              <button class="flip-btn" onclick="clearRegex()" title="Clear">🧹</button>
            </div>
          </div>
          <textarea id="regexSegments" class="regex-input"
                    placeholder="Drag names, emails, links, or attachment filenames here — or type one per line."></textarea>
          <textarea id="regexOutput" class="regex-output" readonly draggable="true"
                    title="Drag this into a search field (or Encase it first)"
                    placeholder="Generated regex appears here."></textarea>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="threadModal" class="modal-overlay" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 id="threadTitle">Thread</h2>
      <div class="modal-actions">
        <button id="threadFlip" class="flip-btn" onclick="flipThreadOrder()">Order: Oldest → Newest</button>
        <button class="icon-btn" onclick="closeThread()" title="Close">✕</button>
      </div>
    </div>
    <div id="threadBody" class="modal-body"></div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/state.js') }}"></script>
<script src="{{ url_for('static', filename='js/render.js') }}"></script>
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
<script src="{{ url_for('static', filename='js/thread.js') }}"></script>
<script src="{{ url_for('static', filename='js/workspace.js') }}"></script>
<script src="{{ url_for('static', filename='js/regex.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
