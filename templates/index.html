<!DOCTYPE html>
<html>
<head>
<title>Mail Analyzer</title>
<meta charset="utf-8">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>Mail Analyzer</h2>

    <label>From Date/Time</label>
    <input type="datetime-local" id="startDate">

    <label>To Date/Time</label>
    <input type="datetime-local" id="endDate">

    <label>Main Keywords</label>
    <div class="search-row">
      <input type="text" id="mainKeywords" placeholder="server; [502, 504]"
             title="Operators:  , = OR    ; = AND    [ ] = group    <{( regex )}>">
      <button class="icon-btn" onclick="applyFilters()" title="Search">🔍</button>
    </div>
    <div class="hint">, = or &nbsp; ; = and &nbsp; [ ] = group &nbsp; &lt;{(&nbsp;regex&nbsp;)}&gt;</div>

    <label>Optional Keywords</label>
    <input type="text" id="optionalKeywords" placeholder="urgent, critical"
           title="Highlight only. Same operators as Main Keywords.">

    <label>Exclude Keywords</label>
    <input type="text" id="excludeKeywords" placeholder="spam, ads, newsletter"
           title="Same operators as Main Keywords.">

    <label>Sender</label>
    <input type="text" id="senderFilter" placeholder="alice, bob"
           title="Same operators as Main Keywords.">

    <label>Recipient</label>
    <input type="text" id="recipientFilter" placeholder="name or email"
           title="Same operators as Main Keywords.">

    <button type="button" id="resourcesToggle" class="toggle-btn"
            aria-pressed="false" onclick="toggleResources()">
      📎 Attachments &amp; Links: Off
    </button>

    <div class="status-group">
      <div class="status-box">
        <b>Last Refresh</b>
        <div id="lastRefresh">Never</div>
      </div>
      <div class="status-box">
        <b>Status</b>
        <div id="fetchStatus">Unknown</div>
      </div>
      <button class="icon-btn refresh-btn" onclick="refreshMail()" title="Refresh Mail">⟳</button>
    </div>
  </div>

  <div class="content">
    <div id="mailContainer"></div>
  </div>
</div>

<div id="threadModal" class="modal-overlay" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 id="threadTitle">Thread</h2>
      <div class="modal-actions">
        <button id="threadFlip" class="flip-btn" onclick="flipThreadOrder()">Order: Oldest → Newest</button>
        <button class="icon-btn" onclick="closeThread()" title="Close">✕</button>
      </div>
    </div>
    <div id="threadBody" class="modal-body"></div>
  </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
